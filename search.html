<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pencarian - SDN Pondok Labu 03</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #f5f7fa;
        }

        /* TOMBOL BACK BULAT DI POJOK KIRI ATAS */
        .btn-back-circle {
            position: fixed;
            top: 30px;
            left: 25px;
            z-index: 9999;
            width: 36px;
            height: 36px;
            background: #A7D2F7;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: black;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
        }

        .btn-back-circle:hover {
            background: #8fc8fb;
            transform: scale(1.08);
        }

        .search-container {
            max-width: 700px;
            margin: 60px auto;
            padding: 20px;
        }

        .search-title {
            text-align: center;
            margin-bottom: 25px;
        }

        .search-title h1 {
            color: #1a1a2e;
            font-size: 1.5rem;
        }

        .search-title p {
            color: #666;
            margin-top: 6px;
            font-size: 0.8rem;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .search-box input {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: 12px;
            font-size: 0.85rem;
            box-shadow: 0 4px 12px rgba(0, 0, 0, .08);
            outline: none;
        }

        .search-box input:focus {
            box-shadow: 0 4px 12px rgba(167, 210, 247, 0.4);
        }

        .search-box button {
            padding: 10px 20px;
            border: none;
            border-radius: 12px;
            background: #a7d2f7;
            cursor: pointer;
            font-weight: 600;
            transition: .3s;
            font-size: 0.85rem;
        }

        .search-box button:hover {
            background: #8fc8fb;
            transform: translateY(-2px);
        }

        .result-item {
            background: white;
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 10px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, .05);
            transition: .3s;
        }

        .result-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, .1);
        }

        .result-item a {
            text-decoration: none;
            color: #1a1a2e;
            display: block;
        }

        .result-item h3 {
            margin-bottom: 4px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .result-item p {
            color: #666;
            font-size: 0.75rem;
        }

        /* RESPONSIVE MOBILE */
        @media (max-width: 768px) {
            .btn-back-circle {
                top: 15px;
                left: 12px;
                width: 32px;
                height: 32px;
                font-size: 0.75rem;
            }

            .search-container {
                margin: 30px auto;
                padding: 15px;
            }

            .search-title h1 {
                font-size: 1.2rem;
            }

            .search-title p {
                font-size: 0.7rem;
            }

            .search-box {
                flex-direction: column;
                gap: 8px;
            }

            .search-box input {
                padding: 8px 14px;
                font-size: 0.8rem;
            }

            .search-box button {
                padding: 8px 16px;
                font-size: 0.8rem;
            }

            .result-item {
                padding: 12px 14px;
            }

            .result-item h3 {
                font-size: 0.85rem;
            }

            .result-item p {
                font-size: 0.7rem;
            }
        }
    </style>
</head>

<body>

    <!-- TOMBOL BACK BULAT DI POJOK KIRI ATAS -->
    <a href="javascript:history.back()" class="btn-back-circle">
        <i class="fas fa-arrow-left"></i>
    </a>

    <div class="search-container">
        <div class="search-title">
            <h1>🔍 Pencarian</h1>
            <p>Cari informasi yang kamu butuhkan</p>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Ketik kata kunci...">
            <button onclick="searchData()">Cari</button>
        </div>

        <div id="results"></div>
    </div>

    <script>
        const data = [
            {
                title: "Profil Sekolah",
                desc: "Visi, misi, sejarah dan informasi sekolah",
                link: "profil.html"
            },
            {
                title: "Berita",
                desc: "Berita terbaru SDN Pondok Labu 03",
                link: "berita.html"
            },
            {
                title: "Pengumuman",
                desc: "Informasi dan pengumuman sekolah",
                link: "pengumuman.html"
            },
            {
                title: "PPDB",
                desc: "Penerimaan Peserta Didik Baru",
                link: "ppdb.html"
            },
            {
                title: "Mutasi",
                desc: "Informasi mutasi peserta didik",
                link: "mutasi.html"
            },
            {
                title: "Galeri",
                desc: "Dokumentasi kegiatan sekolah",
                link: "galeri.html"
            },
            {
                title: "Dokumen Sekolah",
                desc: "Struktur organisasi, sertifikat akreditasi, piagam penghargaan",
                link: "dokumen.html"
            }
        ];

        function searchData() {
            const keyword = document.getElementById("searchInput").value.toLowerCase().trim();
            const results = document.getElementById("results");
            results.innerHTML = "";

            if (keyword === "") {
                results.innerHTML = `
                    <div class="result-item">
                        <p>Ketik kata kunci untuk mencari informasi.</p>
                    </div>
                `;
                return;
            }

            const filtered = data.filter(item =>
                item.title.toLowerCase().includes(keyword) ||
                item.desc.toLowerCase().includes(keyword)
            );

            if (filtered.length === 0) {
                results.innerHTML = `
                    <div class="result-item">
                        <p>Tidak ditemukan hasil pencarian untuk "<strong>${keyword}</strong>".</p>
                        <p style="margin-top: 8px;">Coba gunakan kata kunci lain seperti: profil, berita, ppdb, mutasi, galeri</p>
                    </div>
                `;
                return;
            }

            filtered.forEach(item => {
                results.innerHTML += `
                    <div class="result-item">
                        <a href="${item.link}">
                            <h3>${item.title}</h3>
                            <p>${item.desc}</p>
                        </a>
                    </div>
                `;
            });
        }

        // Pencarian otomatis saat mengetik
        document.getElementById("searchInput").addEventListener("keyup", searchData);

        // Pencarian dengan tombol Enter
        document.getElementById("searchInput").addEventListener("keypress", function(e) {
            if (e.key === "Enter") {
                searchData();
            }
        });
    </script>

</body>
</html>
